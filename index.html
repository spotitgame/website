<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline - DomoFM</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    .container {
        text-align: center;
        padding: 40px;
        border-radius: 20px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(15px);
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        max-width: 400px;
        width: 90%;
        animation: fadeIn 1s ease;
    }

    .icon {
        font-size: 60px;
        margin-bottom: 20px;
        animation: pulse 2s infinite;
    }

    h1 {
        font-size: 24px;
        margin-bottom: 10px;
    }

    p {
        opacity: 0.7;
        margin-bottom: 25px;
    }

    .status {
        display: inline-block;
        padding: 8px 16px;
        border-radius: 999px;
        background: rgba(255, 100, 100, 0.2);
        color: #ff6b6b;
        font-size: 14px;
        margin-bottom: 20px;
    }

    button {
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        background: #3b82f6;
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #2563eb;
    }

    .footer {
        margin-top: 20px;
        font-size: 12px;
        opacity: 0.5;
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.7; }
        100% { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>

<div class="container">
    <div class="icon">⚡</div>

    <div class="status">Sistema offline</div>

    <h1>DomoFM indisponível</h1>

    <p>
        O sistema está temporariamente inacessível.<br>
        Estamos a tentar restabelecer a ligação.
    </p>

    <button onclick="location.reload()">🔄 Tentar novamente</button>

    <div class="footer">
        © 2026 DomoFM
    </div>
</div>

</body>
</html>
